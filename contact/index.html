<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact Zee" />
    <title>Contact - Zee</title>
    <script type="importmap">
      {
        "imports": {
          "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js",
          "@studio-freight/lenis": "https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/+esm"
        }
      }
    </script>
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/components/header.css" />
    <link rel="stylesheet" href="/src/styles/components/footer.css" />
  </head>
  <body data-page="contact">
    <div id="header-root"></div>

    <main>
      <section class="section" style="margin-top: 100px">
        <div class="container" style="max-width: 600px">
          <h1 class="text-center">Start a Project</h1>
          <p class="text-center" style="margin-top: var(--spacing-md)">
            Get in touch to discuss your next design project.
          </p>
          <form style="margin-top: var(--spacing-xxl)">
            <div style="margin-bottom: var(--spacing-md)">
              <label
                for="name"
                style="display: block; margin-bottom: var(--spacing-sm)"
                >Name</label
              >
              <input
                type="text"
                id="name"
                name="name"
                required
                style="
                  width: 100%;
                  padding: var(--spacing-sm);
                  border: 1px solid var(--color-sumi-300);
                  border-radius: var(--border-radius);
                "
              />
            </div>
            <div style="margin-bottom: var(--spacing-md)">
              <label
                for="email"
                style="display: block; margin-bottom: var(--spacing-sm)"
                >Email</label
              >
              <input
                type="email"
                id="email"
                name="email"
                required
                style="
                  width: 100%;
                  padding: var(--spacing-sm);
                  border: 1px solid var(--color-sumi-300);
                  border-radius: var(--border-radius);
                "
              />
            </div>
            <div style="margin-bottom: var(--spacing-md)">
              <label
                for="message"
                style="display: block; margin-bottom: var(--spacing-sm)"
                >Message</label
              >
              <textarea
                id="message"
                name="message"
                rows="6"
                required
                style="
                  width: 100%;
                  padding: var(--spacing-sm);
                  border: 1px solid var(--color-sumi-300);
                  border-radius: var(--border-radius);
                "
              ></textarea>
            </div>
            <button
              type="submit"
              class="btn-primary"
              style="width: 100%; padding: var(--spacing-md)"
            >
              Send Message
            </button>
          </form>
        </div>
      </section>
    </main>

    <div id="footer-root"></div>

    <script type="module" src="/src/pages/contact.js"></script>
    <script type="module" src="/src/app/boot.js"></script>
  </body>
</html>
